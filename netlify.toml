[build]
  command = "vite build"
  publish = "dist/client"
[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

[images]
remote_images = ["https://picsum\\.photos/.*"]

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/api/image/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
